apiVersion: apps/v1
kind: Deployment
metadata:
  name: arize-litellm
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arize-litellm
  template:
    metadata:
      labels:
        app: arize-litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          args:
            - --port
            - "4000"
            - --config
            - /etc/litellm/config.yaml
          envFrom:
            - configMapRef:
                name: arize-ollama-models
          env:
            - name: LITELLM_LOG
              value: INFO
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: arize-litellm-config
